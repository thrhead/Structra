<!DOCTYPE html><html class="h-full" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Industrial Project Portal Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#2563eb",
              "background-light": "#f8fafc",
              "background-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "12px",
            },
          },
        },
      };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full w-full overflow-hidden bg-background-light">
<div class="fixed inset-0 z-0">
<img alt="Industrial isometric construction illustration" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVInzIwDED1gTH9D3W1O6NqagVGfssjm3ZRW7RaOulQmtYk1UIxFYz3w9kVHGmzyAIH7se_Nm6gSn_pArouOOVN28xv_N0XJTDTvLXS63jOHiHwTnsUdLkX5vspvyaMuruw51YncusrQCWcyAQUgGOTnSFKpw2rp7ceHi2QpnuNwrnIeQNneTUqPzaWOQJOsUcGiXc2BxvolYWIx9bSgb1KypVxiGTU-A7_MvH5JYHGLOEmFSzfxfGdF7HKCYKxnNvh1ZC0-UBdNqo" style="">
<div class="absolute inset-0 bg-blue-900/20 backdrop-brightness-95"></div>
</div>
<main class="relative z-10 flex items-center justify-center min-h-full px-6 py-12">
<div class="w-full max-w-sm">
<div class="glass-card rounded-[24px] px-8 py-10 shadow-2xl backdrop-blur-md">
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mb-4 border border-white/20 shadow-inner">
<span class="material-symbols-outlined text-white text-3xl" style="">
                            precision_manufacturing
                        </span>
</div>
<h1 class="text-2xl font-bold text-white tracking-tight" style="">Structra</h1>
<p class="text-white/70 text-sm mt-1 font-medium text-center" style="">Proje Verilerine Erişmek İçin Giriş Yapın</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<div>
<label class="sr-only" for="email" style="">Email Address</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/50 group-focus-within:text-white transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]" style="">mail</span>
</span>
<input class="block w-full pl-11 pr-4 py-3.5 bg-black/20 border border-white/10 text-white placeholder-white/50 rounded-xl focus:ring-1 focus:ring-white/40 focus:border-white/40 focus:bg-black/30 transition-all outline-none text-sm" id="email" placeholder="Email" type="email">
</div>
</div>
<div>
<label class="sr-only" for="password" style="">Password</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center text-white/50 group-focus-within:text-white transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]" style="">lock</span>
</span>
<input class="block w-full pl-11 pr-12 py-3.5 bg-black/20 border border-white/10 text-white placeholder-white/50 rounded-xl focus:ring-1 focus:ring-white/40 focus:border-white/40 focus:bg-black/30 transition-all outline-none text-sm" id="password" placeholder="Password" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-white/40 hover:text-white transition-colors cursor-pointer" type="button" style="">
<span class="material-symbols-outlined text-[20px]" style="">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between text-xs pt-1">
<div class="flex items-center">
<input class="h-3.5 w-3.5 rounded border-white/30 bg-white/10 text-blue-500 focus:ring-offset-0 focus:ring-blue-500 checked:bg-blue-500" id="remember-me" name="remember-me" type="checkbox" placeholder="on" value="">
<label class="ml-2 block text-white/70 hover:text-white transition-colors cursor-pointer" for="remember-me" style="">Beni Hatırla</label>
</div>
<a class="font-medium text-blue-200 hover:text-white transition-colors" href="#" style="">Parolanızı mı Unuttunuz?</a>
</div>
<button class="group relative w-full flex justify-center py-3.5 px-4 mt-2 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-transparent focus:ring-blue-500 transition-all duration-200 shadow-lg shadow-blue-900/30 active:scale-[0.98] uppercase tracking-wide" type="submit" style="">
                        Oturum aç</button>
</form>
<div class="mt-8 text-center border-t border-white/10 pt-6">
<p class="text-xs text-white/50" style="">Erişimem mi ihtiyacınız var? <a class="font-semibold text-white hover:text-blue-200 transition-colors ml-1" href="#" style="">Hesap Talebi</a></p>
</div>
</div>
<div class="mt-6 text-center">
<p class="text-white/20 text-[10px] tracking-widest uppercase font-medium" style="">
                V1.0 • Montaj Takip Sistemi
            </p>
</div>
</div>
</main>

</body></html>
