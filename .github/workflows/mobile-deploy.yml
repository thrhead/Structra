name: Mobile Deployment (EAS)

on:
  workflow_dispatch: # Sadece GitHub Actions sekmesinden manuel tetikleme için

jobs:
  build:
    name: EAS Build (Android APK - Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # EAS CLI needs full git history for versioning

      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /home/runner/work/Structra/Structra

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: |
          cd apps/mobile
          npm ci

      - name: Build on EAS
        run: |
          cd apps/mobile
          npx eas-cli build --platform android --profile production --non-interactive
