name: Mobile Deployment (EAS)

on:
  workflow_dispatch: # Sadece GitHub Actions sekmesinden manuel tetikleme için

jobs:
  build:
    name: EAS Build (Android & iOS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: |
          cd apps/mobile
          npm ci

      - name: Build on EAS
        run: |
          cd apps/mobile
          npx eas-build --platform all --profile preview --non-interactive
