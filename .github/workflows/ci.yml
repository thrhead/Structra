name: Assembly Tracker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /home/runner/work/Structra/Structra

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0' # Kritik hata bulsa bile CI'ı durdurmaz, rapor sunar
          severity: 'CRITICAL,HIGH'

  web-ci:
    name: Web App CI
    needs: security
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: structra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fix Git Safe Directory
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install Web Dependencies
      run: npm ci

    - name: Prisma Drift Check
      run: npx prisma migrate dev --name drift_check
      env:
        DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/structra_test"

    - name: Run Web Tests (Vitest)
      run: npm test

    - name: Build Web App
      run: npm run build
      env:
        DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/structra_test"
        NEXTAUTH_SECRET: "test-secret"

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Tests (Playwright)
      run: |
        npm run start &
        npx wait-on http://localhost:3000 --timeout 120000
        npx playwright test
      env:
        DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/structra_test"
        NEXTAUTH_SECRET: "test-secret"
        NEXTAUTH_URL: "http://localhost:3000"

  mobile-ci:
    name: Mobile App CI
    needs: security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fix Git Safe Directory
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install Mobile Dependencies
      run: |
        cd apps/mobile
        npm ci

    - name: Run Mobile Tests
      run: |
        cd apps/mobile
        npm test
